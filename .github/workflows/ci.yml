name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        id: unit
        continue-on-error: true
        run: |
          mkdir -p reports
          npx vitest run --coverage --reporter=default --reporter=json --outputFile=reports/unit.json

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p reports
          set -o pipefail
          npm run build 2>&1 | tee reports/build.log

      - name: Install Playwright browser
        id: playwright
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        id: e2e
        if: ${{ always() && steps.playwright.outcome == 'success' }}
        continue-on-error: true
        run: |
          mkdir -p reports
          npx playwright test --reporter=json > reports/e2e.json

      - name: Write CI summary
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PLAYWRIGHT_INSTALL_OUTCOME: ${{ steps.playwright.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
        run: node scripts/write-ci-summary.mjs

      - name: Comment CI summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- radio-player-ci-summary -->';
            const body = fs.readFileSync('reports/ci-summary.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previousComment = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previousComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previousComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail CI if checks failed
        if: always()
        shell: bash
        run: |
          failed=0

          if [[ "${{ steps.unit.outcome }}" != "success" ]]; then
            echo "Unit tests failed or did not run."
            failed=1
          fi

          if [[ "${{ steps.build.outcome }}" != "success" ]]; then
            echo "Build failed or did not run."
            failed=1
          fi

          if [[ "${{ steps.playwright.outcome }}" != "success" ]]; then
            echo "Playwright browser install failed or did not run."
            failed=1
          fi

          if [[ "${{ steps.e2e.outcome }}" != "success" ]]; then
            echo "E2E tests failed or did not run."
            failed=1
          fi

          exit "$failed"

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        id: unit
        continue-on-error: true
        run: |
          mkdir -p reports
          npx vitest run --coverage --reporter=default --reporter=json --outputFile=reports/unit.json

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p reports
          set -o pipefail
          npm run build 2>&1 | tee reports/build.log

      - name: Install Playwright browser
        id: playwright
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        id: e2e
        if: ${{ always() && steps.playwright.outcome == 'success' }}
        continue-on-error: true
        run: |
          mkdir -p reports
          npx playwright test --reporter=json > reports/e2e.json

      - name: Write CI summary
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PLAYWRIGHT_INSTALL_OUTCOME: ${{ steps.playwright.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
        run: node scripts/write-ci-summary.mjs
